# This file contains common pin mappings for the BigTreeTech Octopus V1.
# To use this config, the firmware should be compiled for the STM32F446 with a "32KiB bootloader"
# Enable "extra low-level configuration options" and select the "12MHz crystal" as clock reference

# after running "make", copy the generated "klipper/out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the OctoPus with that SD card.

# See docs/Config_Reference.md for a description of parameters.

## Voron Design VORON2 250/300/350mm BigTreeTech OctoPus V1 TMC2209 UART config

[include mainsail.cfg]
[include timelapse.cfg]

[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_2D002F000650534841313020-if00
restart_method: command

[mcu EBB]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_220009001750425539393020-if00
restart_method: command

######################################################################
# define the printer

[printer]
kinematics: corexy
max_velocity: 650 
max_accel: 4200   # recommended by input shaper
#max_accel_to_decel: 4000
max_z_velocity: 30          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

[idle_timeout]
timeout: 1800
gcode: _HANDLE_TIMEOUT


[force_move]
enable_force_move: True

[include xyz_steppers.cfg]
[include extruder.cfg]
[include bed.cfg]
[include probe.cfg]
[include fans.cfg]
[include macros.cfg]
[include bed_and_gantry.cfg]
[include lcd.cfg]
[include menu_override.cfg]
[include resonance.cfg]
[include KAMP_Settings.cfg]

[gcode_arcs]
resolution: 1.0

[exclude_object]

######################################################################
# extra temperature sensors

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 100

[temperature_sensor eeb_temp]
sensor_type: temperature_mcu
sensor_mcu: EBB 
min_temp: 10
max_temp: 100

[output_pin lights]
pin: PA2 # Replace gpio8 with the appropriate pin number
value: 0 # Startup value, 0 for off, 1 for on


